<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RNR Digital Metrology Experience Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo_rnr.jpg" alt="RNR Logo" />
      <div>
        <b>RONERA RUBBER</b>
        <span>Digital Metrology<br />Experience Center</span>
      </div>
    </div>

    <button class="nav active" data-scene="home">HOME</button>
    <button class="nav" data-scene="entrance">ENTRANCE</button>
    <button class="nav" data-scene="cmm">CMM ROOM</button>
    <button class="nav" data-scene="atos">ATOS SCAN</button>
    <button class="nav" data-scene="surface">SURFACE / MATERIAL</button>
    <button class="nav" data-scene="storage">STORAGE</button>
    <button class="nav" data-scene="reports">REPORTS</button>

    <button id="auditMode">AUDIT MODE</button>
  </aside>

  <main class="stage">
    <div class="hud top">
      <span id="sceneTitle">HOME</span>
      <span>Temperature: 20.0°C</span>
      <span>Status: Operational</span>
      <span>QMS: IATF 16949 / ISO 9001 / ISO 17025</span>
    </div>

    <section id="scene" class="scene"></section>

    <div class="hud bottom">
      <span>RONERA RUBBER - Plastic Division Metrology & Technical Support Laboratory</span>
      <span>From raw stone, through knowledge and precision, excellence is born!</span>
    </div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modalBox">
      <button id="closeModal">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
